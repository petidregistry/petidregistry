<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Registration</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Tektur:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #141979;
            --neon-blue: #00f3ff;
            --neon-blue-dark: #0055ff;
            --error-red: #ff0055;
            --text-light: #e0f7fa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'IBM Plex Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .form-container {
            background: rgba(0, 10, 40, 0.6);
            padding: 50px;
            border-radius: 15px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.15), inset 0 0 20px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 650px;
        }

        h1 {
            font-family: 'Tektur', sans-serif;
            font-size: 56px;
            text-align: center;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-blue-dark);
            margin-top: 0;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--neon-blue);
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        input[type="text"], 
        input[type="email"], 
        input[type="tel"], 
        input[type="url"] {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-blue-dark);
            border-radius: 5px;
            color: #ffffff;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
            background: rgba(0, 243, 255, 0.05);
        }

        /* Checkbox styling */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        input[type="checkbox"] {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid var(--neon-blue);
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        input[type="checkbox"]:checked {
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        input[type="checkbox"]:checked::after {
            content: '✔';
            position: absolute;
            color: var(--bg-color);
            font-size: 18px;
            left: 3px;
            top: -1px;
            font-family: sans-serif;
        }

        .error-msg {
            color: var(--error-red);
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.6);
            font-weight: 600;
        }

        button {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 18px 30px;
            font-family: 'Tektur', sans-serif;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            border-radius: 5px;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--neon-blue);
        }

        #loading {
            display: none;
            text-align: center;
            color: var(--neon-blue);
            margin-top: 20px;
            font-family: 'Tektur', sans-serif;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Register Pet</h1>
        
        <form id="petForm">
            <div class="form-group">
                <label for="ownerFirstName">Owner's First Name</label>
                <input type="text" id="ownerFirstName" name="OwnerFirstName" required>
            </div>

            <div class="form-group">
                <label for="ownerSecondName">Owner's Second Name</label>
                <input type="text" id="ownerSecondName" name="OwnerSecondName" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="Email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="Phone" required>
            </div>

            <div class="form-group">
                <label for="petName">Pet Name</label>
                <input type="text" id="petName" name="PetName" required>
            </div>

            <div class="form-group">
                <label for="microchip">Microchip Number</label>
                <input type="text" id="microchip" name="Microchip" required>
                <div id="microchipError" class="error-msg">The Microchip Number is invalid. Please try again.</div>
            </div>

            <div class="form-group">
                <label for="stickerUrl">Microchip Sticker Photo URL</label>
                <input type="url" id="stickerUrl" name="Sticker" required>
            </div>

            <div class="form-group">
                <label for="petPhotoUrl">Pet Photo URL</label>
                <input type="url" id="petPhotoUrl" name="PetPhoto" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="paid" name="Paid" value="Yes">
                <label for="paid">Paid</label>
            </div>
            <div id="paidError" class="error-msg">Please pay to proceed. Thank you.</div>

            <button type="submit" id="submitBtn">Submit Data</button>
            <div id="loading">TRANSMITTING DATA...</div>
        </form>
    </div>

    <script>
        // REPLACE THIS URL with your Google Apps Script Web App URL (See instructions below)
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxPANJYTINd4VK38UAebB02jISsWIX1bz5jFjpt3VQq3E_ljrh77JbVstwngLWFt-ttMQ/exec';

        document.getElementById('petForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission
            
            // Reset error messages
            document.getElementById('microchipError').style.display = 'none';
            document.getElementById('paidError').style.display = 'none';
            
            const microchip = document.getElementById('microchip').value;
            const paid = document.getElementById('paid').checked;
            
            let isValid = true;
            
            // Validation 1: Microchip Number (Exactly 15 numeric digits)
            const microchipRegex = /^\d{15}$/;
            if (!microchipRegex.test(microchip)) {
                document.getElementById('microchipError').style.display = 'block';
                isValid = false;
            }
            
            // Validation 2: Paid Checkbox
            if (!paid) {
                document.getElementById('paidError').style.display = 'block';
                isValid = false;
            }
            
            // Block submission if invalid
            if (!isValid) return;

            // UI feedback while loading
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // Collect form data
            const formData = new FormData(this);
            // Append a timestamp or auto-generate PUID if you wish on the frontend
            formData.append('PUID', 'PUID-' + Math.floor(Math.random() * 100000));

            // Send data to Google Sheets via Apps Script
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                alert("Pet Registered Successfully!");
                document.getElementById('petForm').reset();
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("An error occurred. Please try again.");
            })
            .finally(() => {
                // Restore UI
                document.getElementById('submitBtn').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            });
        });
    </script>
</body>
</html>
