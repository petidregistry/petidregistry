<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Registration - Futuristic UI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Tektur:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #141979;
            --neon-blue: #00f3ff;
            --neon-blue-dark: #0055ff;
            --error-red: #ff0055;
            --text-light: #e0f7fa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'IBM Plex Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .form-container {
            background: rgba(0, 10, 40, 0.7);
            padding: 50px;
            border-radius: 15px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 650px;
        }

        h1 {
            font-family: 'Tektur', sans-serif;
            font-size: 56px;
            text-align: center;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            margin-top: 0;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--neon-blue);
        }

        input[type="text"], input[type="email"], input[type="tel"], input[type="url"] {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--neon-blue-dark);
            border-radius: 5px;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 30px 0 10px 0;
        }

        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .error-msg {
            color: var(--error-red);
            font-size: 14px;
            margin-top: 8px;
            display: none;
            font-weight: 600;
        }

        button {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 18px;
            font-family: 'Tektur', sans-serif;
            font-size: 24px;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--neon-blue);
        }

        #loading {
            display: none;
            text-align: center;
            color: var(--neon-blue);
            margin-top: 20px;
            font-family: 'Tektur', sans-serif;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Register Pet</h1>
        
        <form id="petForm">
            <div class="form-group">
                <label>Owner's First Name</label>
                <input type="text" name="OwnerFirstName" required>
            </div>

            <div class="form-group">
                <label>Owner's Second Name</label>
                <input type="text" name="OwnerSecondName" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="Email" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="Phone" required>
            </div>

            <div class="form-group">
                <label>Pet Name</label>
                <input type="text" name="PetName" required>
            </div>

            <div class="form-group">
                <label>Microchip Number</label>
                <input type="text" id="microchip" name="Microchip" required>
                <div id="microchipError" class="error-msg">The Microchip Number is invalid. Please try again.</div>
            </div>

            <div class="form-group">
                <label>Microchip Sticker Photo URL</label>
                <input type="url" name="Sticker" required>
            </div>

            <div class="form-group">
                <label>Pet Photo URL</label>
                <input type="url" name="PetPhoto" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="paid" name="Paid" value="Yes">
                <label for="paid">Paid</label>
            </div>
            <div id="paidError" class="error-msg">Please pay to proceed. Thank you.</div>

            <button type="submit" id="submitBtn">Submit Data</button>
            <div id="loading">TRANSMITTING...</div>
        </form>
    </div>

    <script>
        // Replace with your actual script URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby4qFGTBDfk1zhO2smavahll1P0uOSNrNKNi4kpgGjJRNiSokbm-dySryytqOTCUMi4SQ/exec';

        document.getElementById('petForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const microchip = document.getElementById('microchip').value;
            const paid = document.getElementById('paid').checked;
            const microchipError = document.getElementById('microchipError');
            const paidError = document.getElementById('paidError');
            
            // Validation
            let isValid = true;
            if (!/^\d{15}$/.test(microchip)) {
                microchipError.style.display = 'block';
                isValid = false;
            } else { microchipError.style.display = 'none'; }

            if (!paid) {
                paidError.style.display = 'block';
                isValid = false;
            } else { paidError.style.display = 'none'; }

            if (!isValid) return;

            // UI Changes
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // Prepare Data
            const formData = new FormData(this);
            formData.append('PUID', 'PET-' + Date.now());

            // Convert FormData to URLSearchParams for better Google compatibility
            const params = new URLSearchParams(formData);

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: params,
                mode: 'no-cors' // This bypasses CORS issues
            })
            .then(() => {
                alert("Data Sent! Check your spreadsheet in a few seconds.");
                document.getElementById('petForm').reset();
            })
            .catch(err => {
                alert("Error sending data.");
                console.error(err);
            })
            .finally(() => {
                document.getElementById('submitBtn').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            });
        });
    </script>
</body>
</html>
