<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Registration</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=Tektur:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #141979;
            --neon-blue: #00f3ff;
            --neon-blue-dark: #0055ff;
            --error-red: #ff0055;
            --text-light: #e0f7fa;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'IBM Plex Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background: rgba(0, 10, 40, 0.8);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 650px;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-family: 'Tektur', sans-serif;
            font-size: clamp(32px, 8vw, 56px); /* Responsive font scaling */
            text-align: center;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            margin: 0 0 40px 0;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--neon-blue);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Added select and textarea to the global input styling */
        input[type="text"], input[type="email"], input[type="tel"], input[type="url"], input[type="file"], select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--neon-blue-dark);
            border-radius: 5px;
            color: #ffffff;
            font-size: 16px;
            font-family: 'IBM Plex Sans', sans-serif;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* Styling dropdown options so they don't look white-on-white in some browsers */
        select option {
            background-color: var(--bg-color);
            color: #ffffff;
        }

        /* Restrict textarea resizing to vertical only to keep UI intact */
        textarea {
            resize: vertical;
        }

        /* Styling for the custom file upload button to match your UI */
        input[type="file"]::file-selector-button {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 15px;
            font-family: 'IBM Plex Sans', sans-serif;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 25px 0 5px 0;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--neon-blue);
        }

        .error-msg {
            color: var(--error-red);
            font-size: 13px;
            margin-top: 5px;
            display: none;
            font-weight: 600;
            text-shadow: 0 0 5px var(--error-red);
        }

        button {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 15px;
            font-family: 'Tektur', sans-serif;
            font-size: 20px;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 25px var(--neon-blue);
        }

        /* Success Message Overlay */
        #success-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        #success-overlay h2 {
            font-family: 'Tektur', sans-serif;
            color: var(--neon-blue);
            font-size: 32px;
        }

        #loading {
            display: none;
            text-align: center;
            color: var(--neon-blue);
            margin-top: 20px;
            font-family: 'Tektur', sans-serif;
            letter-spacing: 2px;
        }

        /* Responsive Adjustments */
        @media (max-width: 480px) {
            .form-container { padding: 25px; }
            h1 { margin-bottom: 25px; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div id="success-overlay">
            <h2>Thanks for your registration</h2>
            <button onclick="location.reload()" style="width: auto; padding: 10px 30px; font-size: 16px;">Add Another</button>
        </div>

        <h1>Register Pet</h1>
        
        <form id="petForm">
            <div class="form-group"><label>First Name</label><input type="text" name="OwnerFirstName" required></div>
            <div class="form-group"><label>Last Name</label><input type="text" name="OwnerSecondName" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="Email" required></div>
            <div class="form-group"><label>Phone</label><input type="tel" name="Phone" required></div>
            <div class="form-group"><label>Pet Name</label><input type="text" name="PetName" required></div>
            
            <div class="form-group">
                <label>Microchip Number</label>
                <input type="text" id="microchip" name="Microchip" required>
                <div id="microchipError" class="error-msg">The Microchip Number is invalid. Please try again.</div>
            </div>

            <div class="form-group"><label>Upload Microchip Sticker Photo</label><input type="file" id="stickerFile" accept="image/*" required></div>
            <div class="form-group"><label>Upload Pet Photo</label><input type="file" id="petPhotoFile" accept="image/*" required></div>

            <div class="form-group">
                <label>Choose pet Gender</label>
                <select name="Gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Unknown">Unknown / Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Please add description</label>
                <textarea name="Description" rows="3" placeholder="Breed, color, spayed or castrated, distinct markings..." required></textarea>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="paid" name="Paid" value="Yes">
                <label for="paid">Paid</label>
            </div>
            <div id="paidError" class="error-msg">Please pay to proceed. Thank you.</div>

            <button type="submit" id="submitBtn">Register My Pet</button>
            <div id="loading">UPLOADING TO PETID REGISTRY...<br><small style="font-size:12px; font-family:'IBM Plex Sans', sans-serif;">(This may take a moment...)</small></div>
        </form>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNRT0fMNuIVNp4rERAOUlvuaMIUvCxjDz0Phd-MRCrlOB_fNPxbN7GqA8mNt7uPSzcVw/exec';

        // Helper function to read file as Base64 string
        const getBase64 = (file) => new Promise((resolve, reject) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]); // extract only the Base64 chunk
            reader.onerror = error => reject(error);
        });

        // Notice the 'async' added here
        document.getElementById('petForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const microchip = document.getElementById('microchip').value;
            const paid = document.getElementById('paid').checked;
            
            // Validation Logic
            let isValid = true;
            if (!/^\d{15}$/.test(microchip)) {
                document.getElementById('microchipError').style.display = 'block';
                isValid = false;
            } else { document.getElementById('microchipError').style.display = 'none'; }

            if (!paid) {
                document.getElementById('paidError').style.display = 'block';
                isValid = false;
            } else { document.getElementById('paidError').style.display = 'none'; }

            if (!isValid) return;

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                // Grab files
                const stickerFile = document.getElementById('stickerFile').files[0];
                const petPhotoFile = document.getElementById('petPhotoFile').files[0];

                // Convert to Base64
                const stickerBase64 = await getBase64(stickerFile);
                const petPhotoBase64 = await getBase64(petPhotoFile);

                // Build Form Data
                const formData = new FormData(this);
                formData.append('PUID', 'PET-' + Date.now());
                
                // Append Base64 image payload to bypass default fetch file-handling limits
                if (stickerFile) {
                    formData.append('StickerBase64', stickerBase64);
                    formData.append('StickerFileName', 'Sticker_' + Date.now() + '_' + stickerFile.name);
                    formData.append('StickerMimeType', stickerFile.type);
                }
                
                if (petPhotoFile) {
                    formData.append('PetPhotoBase64', petPhotoBase64);
                    formData.append('PetPhotoFileName', 'Pet_' + Date.now() + '_' + petPhotoFile.name);
                    formData.append('PetPhotoMimeType', petPhotoFile.type);
                }

                const params = new URLSearchParams(formData);

                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: params,
                    mode: 'no-cors'
                })
                .then(() => {
                    // Show Success Message
                    document.getElementById('success-overlay').style.display = 'flex';
                })
                .catch(err => {
                    alert("Critical Link Error. Please check your connection.");
                    document.getElementById('submitBtn').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                });

            } catch (error) {
                alert("Error processing the photos. Please try again.");
                document.getElementById('submitBtn').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                console.error(error);
            }
        });
    </script>
</body>
</html>
